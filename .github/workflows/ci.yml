name: ContextSeal CI

on:
  push:
    branches: [main, "agent/**", "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install --ignore-scripts
      - run: npm run validate
      - name: Build container
        run: docker build -t contextseal:${{ github.sha }} .
